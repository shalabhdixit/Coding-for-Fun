# ──────────────────────────────────────────────────────────────────────────────
# Documentation Compliance Workflow
#
# Purpose : Validates that every pull request includes the required
#           documentation files and that README.md contains all mandatory
#           sections before a merge is allowed.
#
# Triggers: pull_request (opened, synchronize, reopened)
#
# Checks  :
#   1. Required files exist
#        README.md, LICENSE, CONTRIBUTING.md, CODE_OF_CONDUCT.md, SECURITY.md
#   2. README.md contains required sections (case-insensitive heading match)
#        Description/Overview, Prerequisites/Requirements, Installation/Setup,
#        Usage/Examples, Contributing, License
#
# On failure:
#   • Annotates the workflow run with an error message
#   • Posts (or updates) a detailed comment on the PR
#   • Fails the job, blocking merge when branch protection is enabled
# ──────────────────────────────────────────────────────────────────────────────

name: Documentation Compliance

on:
  pull_request:
    branches:
      - main
      - master
      - develop
    types:
      - opened
      - synchronize
      - reopened

# Cancel in-progress runs for the same PR when a new push arrives
concurrency:
  group: docs-compliance-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  docs-compliance:
    name: Documentation Compliance Check
    runs-on: ubuntu-latest

    permissions:
      contents: read       # checkout
      pull-requests: write # post PR comment

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Run all compliance checks ─────────────────────────────────────────
      - name: Run documentation compliance checks
        id: compliance
        shell: bash
        run: |
          PASSED=true
          REPORT="$RUNNER_TEMP/docs-compliance-report.md"

          # ── helpers ──────────────────────────────────────────────────────────
          pass_row() { echo "| ✅ Pass | $1 |" >> "$REPORT"; }
          fail_row() { echo "| ❌ Fail | $1 |" >> "$REPORT"; PASSED=false; }

          check_file() {
            local FILE="$1" DESC="$2"
            if [ -f "$FILE" ]; then
              pass_row "\`$FILE\` — $DESC"
            else
              fail_row "\`$FILE\` — $DESC **[FILE MISSING]**"
            fi
          }

          check_section() {
            local LABEL="$1" PATTERN="$2"
            if grep -qiE "^#{1,3}[[:space:]]+($PATTERN)" README.md 2>/dev/null; then
              pass_row "$LABEL"
            else
              fail_row "$LABEL **[SECTION NOT FOUND IN README.md]**"
            fi
          }

          # ── Required file checks ─────────────────────────────────────────────
          cat >> "$REPORT" << 'TABLE'
### 📁 Required Files

| Status | Check |
|--------|-------|
TABLE

          check_file "README.md"          "Project overview and usage instructions"
          check_file "LICENSE"            "Licensing terms for the project"
          check_file "CONTRIBUTING.md"    "Contribution guidelines for collaborators"
          check_file "CODE_OF_CONDUCT.md" "Community behavior standards"
          check_file "SECURITY.md"        "Security vulnerability reporting process"

          # ── README section checks ────────────────────────────────────────────
          cat >> "$REPORT" << 'TABLE'

### 📄 README.md — Required Sections

| Status | Section |
|--------|---------|
TABLE

          if [ ! -f "README.md" ]; then
            fail_row "All section checks skipped — README.md is missing"
          else
            check_section "Project Description / Overview / About" \
              "description|overview|about|introduction"
            check_section "Prerequisites / Requirements / Dependencies" \
              "prerequisites|requirements|dependencies"
            check_section "Installation / Getting Started / Setup" \
              "installation|getting[[:space:]]started|setup|quickstart"
            check_section "Usage / Examples" \
              "usage|examples|how[[:space:]]to[[:space:]]use"
            check_section "Contributing" \
              "contributing|contribution"
            check_section "License" \
              "licen[sc]e"
          fi

          # ── Build final report with status header ────────────────────────────
          if [ "$PASSED" = "true" ]; then
            HEADER="## ✅ Documentation Compliance — PASSED"
            FOOTER="> All required documentation files and README sections are present. \
          This PR is cleared to merge."
          else
            HEADER="## ❌ Documentation Compliance — FAILED"
            FOOTER="> **Action required:** Add the missing files or README sections \
          listed above and push again to re-run this check."
          fi

          BODY=$(cat "$REPORT")
          {
            echo "$HEADER"
            echo ""
            echo "$BODY"
            echo ""
            echo "---"
            echo "$FOOTER"
          } > "$REPORT"

          # Write to the Actions job summary
          cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"

          # Expose outputs for downstream steps
          echo "report_file=$REPORT" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED"      >> "$GITHUB_OUTPUT"

      # ── 3. Post or update PR comment ─────────────────────────────────────────
      - name: Post PR comment with compliance results
        uses: actions/github-script@v7
        if: always()
        env:
          REPORT_FILE: ${{ steps.compliance.outputs.report_file }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const path = process.env.REPORT_FILE;

            // Read the report generated by the compliance step
            const reportBody = (path && fs.existsSync(path))
              ? fs.readFileSync(path, 'utf8')
              : '⚠️ The compliance report could not be generated. Check the workflow logs.';

            // Unique HTML comment used to find and update an existing bot comment
            const MARKER = '<!-- docs-compliance-check -->';
            const body   = `${MARKER}\n${reportBody}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.startsWith(MARKER));

            if (existing) {
              // Update the existing comment so the PR thread stays clean
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing documentation compliance comment (id: ${existing.id})`);
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info('Created new documentation compliance comment.');
            }

      # ── 4. Fail the job if any check did not pass ────────────────────────────
      #   This step is what blocks a PR merge when branch protection requires
      #   this status check to succeed.
      - name: Enforce compliance — fail if checks did not pass
        if: steps.compliance.outputs.passed != 'true'
        run: |
          echo "::error title=Documentation Compliance Failed::\
          One or more required documentation files or README sections are missing. \
          See the PR comment and job summary for details."
          exit 1
